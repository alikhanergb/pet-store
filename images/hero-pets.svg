  <g fill="#2d6a4f" opacity="0.2">
    <ellipse cx="80" cy="80" rx="8" ry="10" transform="rotate(-20 80 80)"/>
    <circle cx="68" cy="65" r="4"/><circle cx="78" cy="60" r="4"/>
    <circle cx="88" cy="62" r="4"/><circle cx="92" cy="72" r="4"/>
    <ellipse cx="520" cy="60" rx="8" ry="10" transform="rotate(15 520 60)"/>
    <circle cx="508" cy="45" r="4"/><circle cx="518" cy="40" r="4"/>
    <circle cx="528" cy="42" r="4"/><circle cx="532" cy="52" r="4"/>
  </g>
  <!-- Store sign -->
  <rect x="210" y="50" width="180" height="50" rx="8" fill="#c41e3a"/>
  <text x="300" y="82" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">PAW PARADISE</text>
