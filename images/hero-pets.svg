  <line x1="445" y1="200" x2="470" y2="195" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="445" y1="205" x2="472" y2="208" stroke="#adb5bd" stroke-width="1.5"/>
  <path d="M400 275 Q420 290 440 275" stroke="#6c757d" stroke-width="8" fill="none" stroke-linecap="round"/>
