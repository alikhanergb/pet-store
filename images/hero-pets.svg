  <circle cx="185" cy="168" r="6" fill="#2b2d42"/>
  <circle cx="215" cy="168" r="6" fill="#2b2d42"/>
  <circle cx="187" cy="166" r="2" fill="#fff"/>
  <circle cx="217" cy="166" r="2" fill="#fff"/>
  <ellipse cx="200" cy="185" rx="10" ry="7" fill="#8b6914"/>
  <path d="M190 195 Q200 205 210 195" stroke="#8b6914" stroke-width="2" fill="none"/>
