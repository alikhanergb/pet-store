  <circle cx="420" cy="195" r="38" fill="#6c757d"/>
  <polygon points="395,165 385,130 410,155" fill="#6c757d"/>
  <polygon points="445,165 455,130 430,155" fill="#6c757d"/>
  <polygon points="397,163 392,138 407,158" fill="#f4a261"/>
  <polygon points="443,163 448,138 433,158" fill="#f4a261"/>
  <ellipse cx="405" cy="190" rx="8" ry="10" fill="#2b2d42"/>
  <ellipse cx="435" cy="190" rx="8" ry="10" fill="#2b2d42"/>
  <ellipse cx="407" cy="188" rx="2.5" ry="3" fill="#fff"/>
  <ellipse cx="437" cy="188" rx="2.5" ry="3" fill="#fff"/>
  <path d="M415 200 L420 205 L425 200" stroke="#e76f51" stroke-width="2" fill="none"/>
  <line x1="395" y1="200" x2="370" y2="195" stroke="#adb5bd" stroke-width="1.5"/>
