      <stop offset="0%" style="stop-color:#d8f3dc"/>
      <stop offset="100%" style="stop-color:#b7e4c7"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="12"/>
  <!-- Dog -->
  <ellipse cx="200" cy="280" rx="90" ry="30" fill="#c9a66b" opacity="0.3"/>
  <ellipse cx="200" cy="230" rx="70" ry="55" fill="#d4a574"/>
  <circle cx="200" cy="175" r="45" fill="#d4a574"/>
  <ellipse cx="165" cy="155" rx="18" ry="30" fill="#c4956a" transform="rotate(-20 165 155)"/>
